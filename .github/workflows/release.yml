name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=v$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Package version: $v"

      - name: Skip if release tag already exists
        id: gate
        shell: pwsh
        run: |
          git fetch --tags --force
          $tag = "${{ steps.version.outputs.tag }}"
          $matched = git tag -l $tag
          if ($matched) {
            "skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Tag $tag already exists — skip build and release."
          } else {
            "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Tag $tag not found — will build and publish."
          }

      - name: Setup Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        if: steps.gate.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        if: steps.gate.outputs.skip != 'true'
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: npm ci

      - name: Ensure app icons
        if: steps.gate.outputs.skip != 'true'
        run: node scripts/ensure-icons.mjs

      - name: Validate release metadata
        if: steps.gate.outputs.skip != 'true'
        run: npm run check:release

      - name: Test
        if: steps.gate.outputs.skip != 'true'
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
          cargo test --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Build installers (Tauri)
        if: steps.gate.outputs.skip != 'true'
        run: npm run tauri build

      - name: Prepare release notes
        if: steps.gate.outputs.skip != 'true'
        run: node scripts/extract-changelog.mjs ${{ steps.version.outputs.version }} > release-notes.md

      - name: Collect bundle artifacts
        if: steps.gate.outputs.skip != 'true'
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          if (-not (Test-Path $bundle)) { throw "Bundle directory not found: $bundle" }
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Get-ChildItem -Path $bundle -Recurse -Include *.exe,*.msi | ForEach-Object {
            Copy-Item $_.FullName -Destination release-assets/
            Write-Host "Asset: $($_.Name)"
          }
          $installers = Get-ChildItem release-assets -File | Where-Object { $_.Extension -in '.exe', '.msi' }
          if (-not $installers) { throw "No .exe or .msi artifacts found" }
          $checksumLines = Get-ChildItem release-assets -File | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          }
          $checksumLines | Set-Content release-assets/SHA256SUMS.txt -Encoding ascii
          Write-Host "Asset: SHA256SUMS.txt"

      - name: Attest release artifacts
        if: steps.gate.outputs.skip != 'true'
        uses: actions/attest@v4
        with:
          subject-path: release-assets/*

      - name: Create GitHub Release
        if: steps.gate.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ZeroTick ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
